name: Daily Weather Push

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  push-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weather push
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}
          QWEATHER_API_HOST: ${{ vars.QWEATHER_API_HOST || 'devapi.qweather.com' }}
          LOCATION: ${{ vars.LOCATION || '101220101' }}
          CITY_NAME: ${{ vars.CITY_NAME || '合肥' }}
        run: python weather.py
